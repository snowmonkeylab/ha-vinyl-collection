add_record:
  name: Add Record
  description: Add a vinyl record to your collection.
  fields:
    artist:
      name: Artist
      required: true
      example: "Pink Floyd"
      selector:
        text:
    album:
      name: Album
      required: true
      example: "The Dark Side of the Moon"
      selector:
        text:
    year:
      name: Year
      required: false
      example: 1973
      selector:
        number:
          min: 1900
          max: 2100
          mode: box
    genre:
      name: Genre
      required: false
      selector:
        text:
    rating:
      name: Rating
      required: false
      selector:
        number:
          min: 1
          max: 5
          mode: box
    discogs_id:
      name: Discogs ID
      required: false
      selector:
        text:
    cover_url:
      name: Cover Art URL
      required: false
      selector:
        text:
    spotify_uri:
      name: Spotify URI
      required: false
      selector:
        text:

remove_record:
  name: Remove Record
  description: Remove a record from your collection.
  fields:
    record_id:
      name: Record ID
      required: true
      selector:
        text:

update_record:
  name: Update Record
  description: Update fields on an existing record.
  fields:
    record_id:
      name: Record ID
      required: true
      selector:
        text:
    artist:
      name: Artist
      required: false
      selector:
        text:
    album:
      name: Album
      required: false
      selector:
        text:
    year:
      name: Year
      required: false
      selector:
        number:
          min: 1900
          max: 2100
          mode: box
    genre:
      name: Genre
      required: false
      selector:
        text:
    rating:
      name: Rating
      required: false
      selector:
        number:
          min: 1
          max: 5
          mode: box
    spotify_uri:
      name: Spotify URI
      required: false
      selector:
        text:

search:
  name: Search Collection
  description: Search your collection by artist, album, label, genre, or catalog number. Returns matching records.
  fields:
    query:
      name: Query
      required: false
      example: "Pink Floyd"
      selector:
        text:

lookup_discogs:
  name: Lookup Discogs
  description: Search Discogs for a release. Returns up to 8 matching results with metadata and cover art.
  fields:
    query:
      name: Query
      required: true
      example: "Pink Floyd Dark Side of the Moon"
      selector:
        text:

get_config:
  name: Get Config
  description: Returns integration configuration state, including whether Discogs is enabled and a token is set. No outbound calls made.
