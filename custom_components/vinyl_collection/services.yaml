add_record:
  name: Add Record
  description: Add a vinyl record to your collection.
  fields:
    artist:
      name: Artist
      required: true
      example: "Pink Floyd"
      selector:
        text:
    album:
      name: Album
      required: true
      example: "The Dark Side of the Moon"
      selector:
        text:
    year:
      name: Year
      required: false
      example: 1973
      selector:
        number:
          min: 1900
          max: 2100
          mode: box
    format:
      name: Format
      required: false
      selector:
        select:
          options:
            - "LP"
            - "12\""
            - "10\""
            - "7\""
            - "Box Set"
            - "Picture Disc"
          custom_value: true
    condition:
      name: Condition
      required: false
      selector:
        select:
          options:
            - "Mint (M)"
            - "Near Mint (NM)"
            - "Very Good Plus (VG+)"
            - "Very Good (VG)"
            - "Good (G)"
            - "Fair"
            - "Poor"
          custom_value: true
    genre:
      name: Genre
      required: false
      selector:
        text:
    notes:
      name: Notes
      required: false
      selector:
        text:
          multiline: true
    rating:
      name: Rating
      required: false
      selector:
        number:
          min: 1
          max: 5
          mode: box
    discogs_id:
      name: Discogs ID
      required: false
      selector:
        text:
    cover_url:
      name: Cover Art URL
      required: false
      selector:
        text:

remove_record:
  name: Remove Record
  description: Remove a record from your collection.
  fields:
    record_id:
      name: Record ID
      required: true
      selector:
        text:

